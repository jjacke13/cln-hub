# examples/regtest/lightning2.conf
#
# Core Lightning regtest node #2 for cln-hub dev — peer/test partner
# for node #1. Same shape as lightning1.conf, different port + alias.
#
# Usage:
#   mkdir -p $PWD/.dev/lightning2
#   lightningd \
#     --lightning-dir=$PWD/.dev/lightning2 \
#     --conf=$PWD/examples/regtest/lightning2.conf \
#     --daemon
#
# RPC socket lands at:
#   $PWD/.dev/lightning2/regtest/lightning-rpc

network=regtest
developer

bitcoin-rpcconnect=127.0.0.1
bitcoin-rpcport=18443
bitcoin-rpcuser=cln-hub-dev
bitcoin-rpcpassword=cln-hub-dev

# Distinct P2P port so the two nodes can coexist on localhost.
bind-addr=127.0.0.1:19736

alias=cln-hub-test-2
rgb=0055ff

funding-confirms=1
dev-bitcoind-poll=1
dev-fast-gossip
dev-fast-gossip-prune

log-level=debug
log-file=log
database-upgrade=true
