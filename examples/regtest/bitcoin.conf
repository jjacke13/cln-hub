# examples/regtest/bitcoin.conf
#
# Bitcoin Core regtest config for cln-hub local development.
# Local-only, ephemeral chain. Pairs with examples/regtest/lightning{1,2}.conf.
#
# Auth is fixed weak creds (cln-hub-dev / cln-hub-dev) because:
#   - RPC binds 127.0.0.1 only
#   - rpcallowip is 127.0.0.1 only
#   - the chain is regtest, no real value moves
# Do NOT reuse these creds for anything outside this harness.
#
# Conventions for the bitcoin.conf file format (Bitcoin Core ≥ 0.17):
#   - top-level keys apply to whichever chain is selected by `chain=`
#   - keys that should apply only on a given chain go in a [<chain>]
#     section (e.g. [regtest])
#   - RPC/p2p bindings + txindex + fallbackfee are per-network, so
#     they live in the [regtest] block
#
# Usage:
#   mkdir -p $PWD/.dev/bitcoin
#   bitcoind \
#     -datadir=$PWD/.dev/bitcoin \
#     -conf=$PWD/examples/regtest/bitcoin.conf \
#     -daemon

# Select regtest as the active chain.
chain=regtest

# Enable JSON-RPC; CLN talks to bitcoind over RPC.
server=1

# Foreground by default; pass `-daemon` on the CLI to detach.
daemon=0

[regtest]
# RPC binding: localhost only.
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
rpcport=18443
rpcuser=cln-hub-dev
rpcpassword=cln-hub-dev

# P2P binding: localhost only.
bind=127.0.0.1:18444
listen=1

# Required by CLN: regtest has no fee estimator. Without this CLN
# refuses to start (or refuses to open channels).
fallbackfee=0.0001

# Index every tx. Not strictly required for CLN ≥ 23.x, but harmless
# in regtest and lets you query historical transactions via RPC.
txindex=1
