# examples/regtest/lightning1.conf
#
# Core Lightning regtest node #1 for cln-hub dev.
# Pairs with examples/regtest/bitcoin.conf (RPC on 127.0.0.1:18443).
#
# Usage:
#   mkdir -p $PWD/.dev/lightning1
#   lightningd \
#     --lightning-dir=$PWD/.dev/lightning1 \
#     --conf=$PWD/examples/regtest/lightning1.conf \
#     --daemon
#
# RPC socket lands at:
#   $PWD/.dev/lightning1/regtest/lightning-rpc
#
# To talk to this node:
#   lightning-cli --lightning-dir=$PWD/.dev/lightning1 getinfo

# Network ------------------------------------------------------------
network=regtest

# Required by --dev-* flags below (and by some plugin features).
developer

# Bitcoin backend ----------------------------------------------------
bitcoin-rpcconnect=127.0.0.1
bitcoin-rpcport=18443
bitcoin-rpcuser=cln-hub-dev
bitcoin-rpcpassword=cln-hub-dev

# Lightning P2P ------------------------------------------------------
# Non-default port so we don't clash with a live mainnet node on 9735.
bind-addr=127.0.0.1:19735

# Identity -----------------------------------------------------------
alias=cln-hub-test-1
rgb=ff5500

# Regtest speed-ups --------------------------------------------------
# Channel funding confirms after 1 block (default 2) — pair with one
# `bitcoin-cli generatetoaddress 1 ...` to move a channel from
# "pending" to "active" quickly.
funding-confirms=1
# Poll bitcoind every 1s instead of 30s default.
dev-bitcoind-poll=1
# Gossip every 1s instead of 60s default.
dev-fast-gossip
# Prune stale gossip after 120s instead of 14 days default.
dev-fast-gossip-prune

# Operational --------------------------------------------------------
log-level=debug
# Log file (required when using --daemon). Relative paths resolve
# against the lightning-dir, so this becomes
# `<lightning-dir>/regtest/log` at runtime.
log-file=log
# Auto-apply DB schema migrations on startup (avoids interactive prompt
# when CLN upgrades the SQLite layout between releases).
database-upgrade=true
