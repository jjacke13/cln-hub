# .github/workflows/ci.yml
#
# CI for cln-hub. Manual-trigger only (workflow_dispatch) so the
# pipeline doesn't run on every push — saves runner minutes during
# pre-alpha churn. To run: GitHub UI → Actions → CI → Run workflow,
# or `gh workflow run ci.yml`.
#
# Matrix: one job per Linux architecture we ship in flake.nix.
# Each job builds, lints (clippy with warnings as errors), and runs
# the unit-test suite. Failures on either arch block "green".
#
# Why not also `nix build .#cln-hub`?
#   It's slower (Nix re-fetches every crate), and the resulting
#   binary is the same one cargo build produces under the dev shell.
#   Validating the cargo path on each arch is enough for catching
#   regressions; Nix-build validation happens on each developer's
#   machine via the dev shell + `nix build .#cln-hub`.

name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64-linux
          - runner: ubuntu-24.04-arm
            arch: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry, index, and target/
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --verbose

      - name: cargo clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --verbose

      # Vulnerability scan against the RustSec advisory database.
      # Runs after build/clippy/test so a transient cargo-audit
      # outage doesn't mask the more important checks.
      #
      # Why the single ignore: RUSTSEC-2023-0071 flags a timing-oracle
      # in `rsa` 0.9.10. The crate enters our dep-graph via
      # `sqlx-mysql`, which we DO NOT compile — sqlx is locked to
      # features = ["sqlite", "runtime-tokio"]. Verified unreachable:
      # `nm target/debug/cln-hub | grep rsa::` and
      # `ls target/debug/deps/ | grep -E '^(rsa|sqlx_mysql)-'` both
      # come back empty. No fixed upgrade is available upstream;
      # revisit when sqlx 0.9 lands or the macros crate is decoupled
      # from the per-backend deps.
      #
      # `--deny warnings` promotes informational notices (yanked
      # crates, unmaintained) to CI-fail so they don't silently
      # accumulate.
      - name: cargo audit (vuln scan)
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install --locked cargo-audit
          fi
          cargo audit --deny warnings --ignore RUSTSEC-2023-0071
